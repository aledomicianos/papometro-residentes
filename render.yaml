services:
  # ─── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: papometro-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: node dist/server.js
    plan: free                # free tier: sleeps after 15min inactivity
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3333
      - key: DATABASE_URL
        fromDatabase:
          name: papometro-db
          property: connectionString
      - key: CLIENT_URL
        sync: false           # fill in your Vercel URL after deploying frontend

  # ─── PostgreSQL Database ─────────────────────────────────────────────────────
databases:
  - name: papometro-db
    plan: free                # 1GB, 90-day free, then $7/mo
    databaseName: papometro_db
    user: papometro
